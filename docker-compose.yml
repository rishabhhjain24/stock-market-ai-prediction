# ════════════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE - Run locally with one command
# ════════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=False
      - PORT=5000
    volumes:
      - .:/app
    command: gunicorn --workers=2 --worker-class=sync --timeout=120 --bind=0.0.0.0:5000 --reload api_server:app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  trading_data:
